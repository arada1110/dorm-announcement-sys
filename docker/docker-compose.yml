version: "3.9"

services:
    mysql:
        image: mysql:8.4
        container_name: dormitory_mysql
        restart: always
        env_file:
            - ../docker/.env
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${DATABASE_DATABASE}
            MYSQL_USER: ${DATABASE_USER}
            MYSQL_PASSWORD: ${DATABASE_PASSWORD}
        ports:
            - "${DATABASE_PORT}:3306"
        volumes:
            - mysql_data:/var/lib/mysql

volumes:
    mysql_data:
